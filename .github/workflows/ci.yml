name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [payment-service, account-service]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      working-directory: ./services/${{ matrix.service }}
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Docker Image
      run: |
        docker build -t myregistry.com/citi-bank/${{ matrix.service }}:${{ github.sha }} ./services/${{ matrix.service }}

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'myregistry.com/citi-bank/${{ matrix.service }}:${{ github.sha }}'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Push Docker Image
      run: |
        # Uncomment when registry is available
        # docker push myregistry.com/citi-bank/${{ matrix.service }}:${{ github.sha }}
        echo "Pushing image..."

    - name: Update Helm Values for GitOps
      if: github.ref == 'refs/heads/main'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        # Simulate updating the helm values
        # sed -i 's/tag: .*/tag: ${{ github.sha }}/g' kubernetes/helm/${{ matrix.service }}/values.yaml
        git add kubernetes/helm/
        git commit -m "Update ${{ matrix.service }} image to ${{ github.sha }}" || echo "No changes to commit"
        # git push origin main
