apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: citi-bank-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/your-org/citi-bank-platform.git'
    targetRevision: HEAD
    path: kubernetes/manifests
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
